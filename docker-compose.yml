services:
  redis:
    image: redis:7-alpine
    container_name: refvault-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  db:
    image: postgres:16
    container_name: refvault-db
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-refvault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-refvault}
      POSTGRES_DB: ${POSTGRES_DB:-refvault}
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-refvault} -d $${POSTGRES_DB:-refvault}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: refvault-app
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: db
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
volumes:
  db_data:
