services:
  db:
    image: postgres:16
    container_name: refvault-db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-refvault} -d $${POSTGRES_DB:-refvault}"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    container_name: refvault-app
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy
volumes:
  db_data:
