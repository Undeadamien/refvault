services:
  db:
    image: postgres:16
    container_name: refvault-db
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-refvault}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: refvault-app
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
