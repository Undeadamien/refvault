app = "refvault"
primary_region = "cdg"

[build]

[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 0
[http_service.concurrency]
type = "connections"
hard_limit = 25
soft_limit = 20
processes = ["app"]

[[vm]]
cpu_kind = "shared"
cpus = 1
memory_mb = 512

[mounts]
source = "refvault_uploads"
destination = "/app/uploads"
